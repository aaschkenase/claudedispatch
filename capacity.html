<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tag Trans Inc — Available Capacity</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e13;--bg2:#111722;--bg3:#18202e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.05);
  --text:#e2e8f0;--muted:rgba(255,255,255,0.45);
  --blue:#38bdf8;--green:#34d399;--orange:#fb923c;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--bg2)}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#e85d2f,#b83c18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px}
.tagline{font-size:11px;color:var(--muted);margin-top:2px}
.header-right{font-size:12px;color:var(--muted);text-align:right;line-height:1.7}
.header-right a{color:var(--blue);text-decoration:none;font-weight:600}
.body{display:grid;grid-template-columns:1fr 240px;gap:14px;padding:14px;max-width:1280px;margin:0 auto}
@media(max-width:700px){.body{grid-template-columns:1fr}}
.tab-row{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:10px 10px 0 0;overflow:hidden;border-bottom:none}
.tab-btn{flex:1;padding:11px 8px;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent}
.tab-btn:hover:not(.on){color:var(--text);background:rgba(255,255,255,0.03)}
.tab-btn.on.t-inbound{color:var(--green);border-bottom-color:var(--green);background:rgba(52,211,153,0.06)}
.tab-btn.on.t-outbound{color:var(--orange);border-bottom-color:var(--orange);background:rgba(251,146,60,0.06)}
.tab-btn.on.t-lanes{color:var(--blue);border-bottom-color:var(--blue);background:rgba(56,189,248,0.06)}
.map-wrap{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
#map{height:480px}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:9px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);align-items:center}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:12px;height:9px;border-radius:2px}
.range-badge{margin-left:auto;padding:4px 10px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.4px;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);color:var(--blue)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.card-hdr{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.card-body{padding:10px 14px}
.state-row{display:flex;justify-content:space-between;align-items:center;padding:7px 4px;border-bottom:1px solid var(--border2);cursor:pointer;border-radius:5px;transition:background .1s}
.state-row:hover{background:rgba(255,255,255,0.04)}
.state-row:last-child{border-bottom:none}
.s-name{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-wpw{font-size:12px;font-weight:800}
.lane-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.lane-row:last-child{border-bottom:none}
.lane-label{font-size:12px;font-weight:700;color:var(--text);width:70px;flex-shrink:0}
.lane-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.lane-bar{height:4px;background:var(--blue);border-radius:2px}
.lane-wpw{font-size:11px;color:var(--muted);width:40px;text-align:right;flex-shrink:0}
.kpi-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.kpi-v{font-size:17px;font-weight:800;color:var(--text);line-height:1;margin-bottom:2px}
.kpi-l{font-size:10px;color:var(--muted)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;font-size:13px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:18px;font-size:11px;color:rgba(255,255,255,0.2);border-top:1px solid var(--border)}
.leaflet-container{background:#0b0e13!important}
.city-popup .leaflet-popup-content-wrapper{background:#111722;border:1px solid rgba(56,189,248,0.3);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.7);padding:0}
.city-popup .leaflet-popup-content{margin:14px 16px;max-height:300px}
.city-popup .leaflet-popup-tip-container{display:none}
.city-popup .leaflet-popup-close-button{color:rgba(255,255,255,.4)!important;font-size:16px!important;top:8px!important;right:10px!important}
.city-popup .leaflet-popup-close-button:hover{color:#fff!important}
.leaflet-tooltip{background:#111722;border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.5);font-size:12px;padding:8px 12px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">🚚</div>
    <div>
      <div class="brand">Tag Trans Inc</div>
      <div class="tagline">Flatbed &amp; Stepdeck Capacity</div>
    </div>
  </div>
  <div class="header-right">
    <div id="syncLabel">Loading…</div>
    <div><a href="mailto:anders.a@tagtrans.net">Contact us for capacity →</a></div>
  </div>
</div>

<div class="body">
  <div>
    <div class="tab-row">
      <button class="tab-btn t-inbound on" id="tab-inbound"  onclick="setView('inbound')">📍 Inbound Origins</button>
      <button class="tab-btn t-outbound"   id="tab-outbound" onclick="setView('outbound')">📦 Outbound Destinations</button>
      <button class="tab-btn t-lanes"      id="tab-lanes"    onclick="setView('lanes')">↔ Active Lanes</button>
    </div>
    <div class="map-wrap">
      <div class="loading" id="mapLoading" style="height:480px"><div class="spinner"></div><div>Loading…</div></div>
      <div id="map" style="display:none;height:480px"></div>
      <div class="legend" id="legend" style="display:none">
        <span id="leg-left" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center"></span>
        <span class="range-badge" id="rangeBadge"></span>
      </div>
    </div>
    <div class="card" style="margin-top:10px">
      <div class="card-hdr" id="lanesHdr">Top active lanes</div>
      <div class="card-body" id="laneList"><div class="loading" style="height:60px"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div>
    <div class="kpi-strip">
      <div class="kpi"><div class="kpi-v" id="kpi1">—</div><div class="kpi-l" id="kpi1l">States</div></div>
      <div class="kpi"><div class="kpi-v" id="kpi2">—</div><div class="kpi-l" id="kpi2l">Lanes</div></div>
    </div>
    <div class="card">
      <div class="card-hdr" id="sideHdr">Top states</div>
      <div class="card-body" id="sideList"><div class="loading" style="height:60px"><div class="spinner"></div></div></div>
    </div>
    <div class="card" style="border-color:rgba(232,93,47,0.3)">
      <div class="card-body" style="text-align:center;padding:16px">
        <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:5px;">Need flatbed capacity?</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5">Midwest, Southeast &amp; Gulf Coast.<br>Let's talk.</div>
        <a href="mailto:anders.a@tagtrans.net" style="display:inline-block;padding:8px 18px;background:rgba(232,93,47,0.2);border:1px solid rgba(232,93,47,0.4);border-radius:7px;color:#e85d2f;font-weight:700;font-size:12px;text-decoration:none;">📧 Contact us</a>
      </div>
    </div>
  </div>
</div>

<div class="footer">Capacity data only · no rates, no driver information · Tag Trans Inc</div>

<script>
var FIRESTORE_URL = 'https://firestore.googleapis.com/v1/projects/dispatch-command-center-951c9/databases/(default)/documents/public/capacity';
var API_KEY = 'AIzaSyCVhCWUXS-3I_HBfwPIaLufqgBAfMY75pc';

var STATE_CENTERS = {
  AL:[32.8,-86.9],AR:[34.8,-92.2],AZ:[34.3,-111.1],CA:[37.2,-119.5],CO:[39.0,-105.5],
  CT:[41.6,-72.7],DE:[39.0,-75.5],FL:[27.8,-81.7],GA:[32.7,-83.4],IA:[42.1,-93.5],
  ID:[44.4,-114.6],IL:[40.0,-89.2],IN:[40.3,-86.1],KS:[38.5,-98.4],KY:[37.5,-85.3],
  LA:[31.2,-91.8],MA:[42.3,-71.8],MD:[39.0,-76.8],ME:[45.4,-69.0],MI:[44.3,-85.4],
  MN:[46.4,-93.1],MO:[38.5,-92.5],MS:[32.7,-89.7],MT:[47.0,-110.5],NC:[35.5,-79.4],
  ND:[47.5,-100.5],NE:[41.5,-99.9],NH:[43.9,-71.6],NJ:[40.1,-74.7],NM:[34.3,-106.1],
  NV:[38.5,-117.1],NY:[42.9,-75.5],OH:[40.4,-82.7],OK:[35.6,-96.9],OR:[44.1,-120.5],
  PA:[40.9,-77.8],RI:[41.7,-71.6],SC:[33.9,-80.9],SD:[44.4,-100.3],TN:[35.9,-86.4],
  TX:[31.5,-99.3],UT:[39.4,-111.5],VA:[37.8,-79.5],VT:[44.0,-72.7],WA:[47.4,-120.5],
  WI:[44.3,-89.8],WV:[38.9,-80.5],WY:[43.0,-107.6],DC:[38.9,-77.0]
};

var STATE_NAMES = {AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',CO:'Colorado',CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',HI:'Hawaii',ID:'Idaho',IL:'Illinois',IN:'Indiana',IA:'Iowa',KS:'Kansas',KY:'Kentucky',LA:'Louisiana',ME:'Maine',MD:'Maryland',MA:'Massachusetts',MI:'Michigan',MN:'Minnesota',MS:'Mississippi',MO:'Missouri',MT:'Montana',NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',NJ:'New Jersey',NM:'New Mexico',NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',VA:'Virginia',WA:'Washington',WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming',DC:'D.C.'};

var INBOUND_COLORS  = ['#022c22','#064e3b','#047857','#059669','#10b981','#34d399'];
var OUTBOUND_COLORS = ['#431407','#7c2d12','#9a3412','#c2410c','#ea580c','#fb923c'];

var capData = null, leafletMap = null, geojson = null;
var abbrs = {}, geoLayers = {}, arcLines = [], labelMarkers = [];
var currentView = 'inbound', selectedState = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────
fetch(FIRESTORE_URL + '?key=' + API_KEY)
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(doc){
    var raw = doc.fields && doc.fields.data && doc.fields.data.stringValue;
    if (!raw) throw new Error('No data');
    capData = JSON.parse(raw);
    if (!capData.byOrigin) capData.byOrigin = capData.byState;
    if (!capData.byDest)   capData.byDest   = capData.byState;
    (capData.topLanes||[]).forEach(function(l){
      if (!l.origin && l.lane){ var p=l.lane.split('→'); l.origin=p[0]||''; l.dest=p[1]||''; }
    });
    var ts = doc.fields.syncedAt && doc.fields.syncedAt.timestampValue;
    var lb = (doc.fields.rangeLabel && doc.fields.rangeLabel.stringValue) || '';
    document.getElementById('syncLabel').textContent = 'Updated '+(ts?new Date(ts).toLocaleDateString():'')+(lb?' · '+lb:'');
    document.getElementById('rangeBadge').textContent = lb;
    initMap();
  })
  .catch(function(err){
    document.getElementById('mapLoading').innerHTML = '<div style="color:#ff4455;font-size:13px;text-align:center;padding:30px;">⚠️ Could not load capacity data.<br><span style="font-size:11px;opacity:.7">Not yet synced from Watchtower.</span></div>';
    ['sideList','laneList'].forEach(function(id){ document.getElementById(id).innerHTML='<div style="color:var(--muted);font-size:12px;padding:8px;">No data available yet.</div>'; });
    document.getElementById('syncLabel').textContent = 'Not yet synced';
  });

// ── Map init ──────────────────────────────────────────────────────────────────
function initMap(){
  document.getElementById('mapLoading').style.display = 'none';
  document.getElementById('map').style.display = '';
  document.getElementById('legend').style.display = '';
  leafletMap = L.map('map',{zoomControl:true,attributionControl:false,scrollWheelZoom:true}).setView([39,-96],4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:18,subdomains:'abcd'}).addTo(leafletMap);
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
    .then(function(r){return r.json();})
    .then(function(us){
      geojson = topojson.feature(us, us.objects.states);
      geojson.features.forEach(function(f){
        var name=(f.properties.name||'').toLowerCase();
        Object.keys(STATE_NAMES).forEach(function(ab){ if(STATE_NAMES[ab].toLowerCase()===name) abbrs[f.id]=ab; });
      });
      renderView('inbound');
    });
}

// ── View switcher ─────────────────────────────────────────────────────────────
function setView(view){
  currentView = view; selectedState = null;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('tab-'+view).classList.add('on');
  renderView(view);
}

function clearMap(){
  arcLines.forEach(function(l){ leafletMap.removeLayer(l); }); arcLines = [];
  labelMarkers.forEach(function(l){ leafletMap.removeLayer(l); }); labelMarkers = [];
  Object.values(geoLayers).forEach(function(l){ leafletMap.removeLayer(l); }); geoLayers = {};
  leafletMap.closePopup();
}

function renderView(view){
  clearMap();
  if (view==='lanes') renderLanesView();
  else renderChoropleth(view);
  renderSidebar(view);
  renderLaneList(view);
}

// ── Choropleth ────────────────────────────────────────────────────────────────
function gradColor(wpw, maxWpw, colors){
  if (!wpw||wpw<=0) return 'rgba(255,255,255,0.03)';
  var t = Math.sqrt(wpw/maxWpw);
  return colors[Math.min(colors.length-1, Math.floor(t*(colors.length-0.01)))];
}

function renderChoropleth(view){
  var data   = view==='inbound' ? capData.byOrigin : capData.byDest;
  var colors = view==='inbound' ? INBOUND_COLORS   : OUTBOUND_COLORS;
  var accent = view==='inbound' ? '#34d399'         : '#fb923c';
  var maxWpw = Math.max.apply(null,Object.values(data).map(function(d){return d.wpw||0;}).concat([1]));

  document.getElementById('leg-left').innerHTML =
    [{l:'Low',i:1},{l:'Medium',i:3},{l:'High',i:5}].map(function(s){
      return '<span class="leg-item"><span class="leg-dot" style="background:'+colors[s.i]+'"></span>'+s.l+'</span>';
    }).join('');

  geojson.features.forEach(function(f){
    var ab = abbrs[f.id];
    var d  = (data[ab])||{};
    var wpw= d.wpw||0;
    var fill = gradColor(wpw, maxWpw, colors);

    var layer = L.geoJSON(f,{
      style:{fillColor:fill,fillOpacity:wpw>0?0.85:0.12,color:'rgba(255,255,255,0.08)',weight:0.6}
    });

    if (ab && wpw>0){
      layer.bindTooltip(
        '<div style="font-weight:700;font-size:13px;margin-bottom:2px;">'+(STATE_NAMES[ab]||ab)+'</div>'+
        '<div style="color:'+accent+';font-weight:800;font-size:13px;">~'+wpw.toFixed(1)+' trucks/wk</div>'+
        '<div style="color:rgba(255,255,255,.4);font-size:11px;margin-top:1px;">Click to see cities</div>',
        {sticky:true,opacity:1}
      );
      layer.on('mouseover',function(){ layer.setStyle({fillOpacity:Math.min(1,0.95),weight:1.5,color:'rgba(255,255,255,0.3)'}); });
      layer.on('mouseout', function(){ if(selectedState!==ab) layer.setStyle({fillOpacity:0.85,weight:0.6,color:'rgba(255,255,255,0.08)'}); });
      layer.on('click',function(e){ openCityPopup(e.latlng,ab,d,wpw,accent,view); });
    }
    layer.addTo(leafletMap);
    geoLayers[ab||f.id] = layer;

    // Trucks/week label
    if (ab && wpw>0){
      var center = layer.getBounds().getCenter();
      var label  = wpw>=10 ? Math.round(wpw)+'/wk' : wpw.toFixed(1)+'/wk';
      var isDark = wpw >= maxWpw*0.3;
      var m = L.marker(center,{
        icon:L.divIcon({
          className:'',
          html:'<div style="text-align:center;pointer-events:none;line-height:1.3;">'+
               '<div style="font-size:8px;font-weight:900;color:'+(isDark?'rgba(255,255,255,.85)':'rgba(20,20,20,.85)')+';text-shadow:0 1px 2px rgba(0,0,0,.6);">'+ab+'</div>'+
               '<div style="font-size:8px;font-weight:800;color:'+accent+';text-shadow:0 1px 3px rgba(0,0,0,.7);">'+label+'</div>'+
               '</div>',
          iconSize:[42,22],iconAnchor:[21,11]
        }),
        interactive:false,keyboard:false
      });
      m.addTo(leafletMap);
      labelMarkers.push(m);
    }
  });
}

// ── Lanes view ────────────────────────────────────────────────────────────────
function bezierPts(o,d,n){
  var mlat=(o[0]+d[0])/2, mlng=(o[1]+d[1])/2;
  var dist=Math.sqrt(Math.pow(d[0]-o[0],2)+Math.pow(d[1]-o[1],2));
  var cp=[mlat+dist*0.45,mlng];
  var pts=[];
  for(var i=0;i<=n;i++){
    var t=i/n;
    pts.push([
      Math.pow(1-t,2)*o[0]+2*(1-t)*t*cp[0]+t*t*d[0],
      Math.pow(1-t,2)*o[1]+2*(1-t)*t*cp[1]+t*t*d[1]
    ]);
  }
  return pts;
}

function renderLanesView(){
  var lanes  = capData.topLanes||[];
  var maxWpw = Math.max.apply(null,lanes.map(function(l){return l.wpw||0;}).concat([1]));

  // Faint state outlines
  geojson.features.forEach(function(f){
    var layer=L.geoJSON(f,{style:{fillColor:'rgba(255,255,255,0.03)',fillOpacity:1,color:'rgba(255,255,255,0.07)',weight:0.5}});
    layer.addTo(leafletMap);
    geoLayers[abbrs[f.id]||f.id]=layer;
  });

  document.getElementById('leg-left').innerHTML =
    '<span class="leg-item"><span class="leg-dot" style="background:#38bdf8;opacity:.35"></span>Low</span>'+
    '<span class="leg-item"><span class="leg-dot" style="background:#38bdf8;opacity:.7"></span>Medium</span>'+
    '<span class="leg-item"><span class="leg-dot" style="background:#38bdf8"></span>High volume</span>'+
    '<span style="margin-left:6px;font-size:10px;color:var(--muted)">● <span style="color:#34d399">origin</span> · <span style="color:#fb923c">destination</span></span>';

  lanes.forEach(function(lane){
    var oC=STATE_CENTERS[lane.origin], dC=STATE_CENTERS[lane.dest];
    if(!oC||!dC) return;
    var t=lane.wpw/maxWpw;
    var line=L.polyline(bezierPts(oC,dC,40),{
      color:'#38bdf8',weight:1+t*5,opacity:0.25+t*0.7,smoothFactor:1,lineCap:'round',lineJoin:'round'
    });
    line.bindTooltip(
      '<div style="font-weight:700;color:#fff;margin-bottom:2px;">'+lane.lane+'</div>'+
      '<div style="color:#38bdf8;font-weight:800;">~'+lane.wpw.toFixed(1)+' loads/wk</div>',
      {sticky:true,opacity:1}
    );
    line.addTo(leafletMap); arcLines.push(line);
    // Origin dot (green) and destination dot (orange)
    [[oC,'#34d399',5],[dC,'#fb923c',4]].forEach(function(p){
      var dot=L.circleMarker(p[0],{radius:p[2],fillColor:p[1],fillOpacity:0.9,color:'rgba(0,0,0,0.4)',weight:1});
      dot.addTo(leafletMap); arcLines.push(dot);
    });
  });
}

// ── City popup ────────────────────────────────────────────────────────────────
function openCityPopup(latlng,ab,d,wpw,accent,view){
  leafletMap.closePopup();
  var cities=Object.entries(d.cities||{}).filter(function(c){return c[0];}).sort(function(a,b){return b[1]-a[1];});
  var viewLbl=view==='inbound'?'pickup locations':'delivery locations';
  var rows=cities.length
    ?'<div style="font-size:10px;color:rgba(255,255,255,.4);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">'+viewLbl+'</div>'+
      cities.map(function(c){
        return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:12px;">'+
          '<span style="font-weight:600;color:#e2e8f0;">'+c[0]+'</span>'+
          '<span style="color:'+accent+';font-weight:700;margin-left:12px;">'+c[1]+' load'+(c[1]!==1?'s':'')+'</span>'+
        '</div>';
      }).join('')
    :'<div style="font-size:12px;color:rgba(255,255,255,.4);">No city detail available.</div>';

  L.popup({maxWidth:230,closeButton:true,className:'city-popup'})
    .setLatLng(latlng)
    .setContent(
      '<div style="font-weight:800;font-size:14px;color:#fff;margin-bottom:2px;">'+(STATE_NAMES[ab]||ab)+'</div>'+
      '<div style="color:'+accent+';font-weight:700;font-size:12px;margin-bottom:10px;">~'+wpw.toFixed(1)+' trucks/wk</div>'+
      '<div style="max-height:240px;overflow-y:auto;padding-right:2px;">'+rows+'</div>'
    ).openOn(leafletMap);

  selectedState=ab;
  document.querySelectorAll('.state-row').forEach(function(r){r.style.background='';});
  var row=document.getElementById('sr-'+ab);
  if(row){row.style.background='rgba(255,255,255,0.04)';row.scrollIntoView({block:'nearest',behavior:'smooth'});}
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(view){
  var k1=document.getElementById('kpi1'),k2=document.getElementById('kpi2');
  var k1l=document.getElementById('kpi1l'),k2l=document.getElementById('kpi2l');
  var hdr=document.getElementById('sideHdr'), listEl=document.getElementById('sideList');
  var lanes=capData.topLanes||[];

  if(view==='lanes'){
    hdr.textContent='Top lane pairs';
    k1.textContent=lanes.length; k1l.textContent='Active lanes';
    k2.textContent=Object.keys(capData.byOrigin||{}).length; k2l.textContent='Origin states';
    listEl.innerHTML=lanes.slice(0,12).map(function(l){
      return '<div class="state-row" style="cursor:default;">'+
        '<span class="s-name">'+l.lane+'</span>'+
        '<span class="s-wpw" style="color:var(--blue);">'+l.wpw.toFixed(1)+'/wk</span>'+
      '</div>';
    }).join(''); return;
  }

  var data=view==='inbound'?capData.byOrigin:capData.byDest;
  var colors=view==='inbound'?INBOUND_COLORS:OUTBOUND_COLORS;
  var accent=view==='inbound'?'#34d399':'#fb923c';
  var maxWpw=Math.max.apply(null,Object.values(data).map(function(d){return d.wpw||0;}).concat([1]));
  var states=Object.entries(data).filter(function(e){return e[1].wpw>0;}).sort(function(a,b){return b[1].wpw-a[1].wpw;});

  hdr.textContent=view==='inbound'?'Top origin states':'Top destination states';
  k1.textContent=states.length; k1l.textContent=view==='inbound'?'Origin states':'Dest states';
  k2.textContent=lanes.length;  k2l.textContent='Active lanes';

  listEl.innerHTML=states.map(function(e){
    var ab=e[0],d=e[1];
    return '<div class="state-row" id="sr-'+ab+'" onclick="clickSideState(\''+ab+'\',\''+view+'\')">'+
      '<div class="s-name"><span class="s-dot" style="background:'+gradColor(d.wpw,maxWpw,colors)+'"></span>'+(STATE_NAMES[ab]||ab)+'</div>'+
      '<span class="s-wpw" style="color:'+accent+';">'+d.wpw.toFixed(1)+'/wk</span>'+
    '</div>';
  }).join('');
}

function clickSideState(ab,view){
  var data=view==='inbound'?capData.byOrigin:capData.byDest;
  var accent=view==='inbound'?'#34d399':'#fb923c';
  var d=data[ab]; if(!d) return;
  var ctr=STATE_CENTERS[ab]; if(!ctr) return;
  openCityPopup(L.latLng(ctr[0],ctr[1]),ab,d,d.wpw,accent,view);
  leafletMap.setView(ctr,5,{animate:true});
}

// ── Lane list below map ───────────────────────────────────────────────────────
function renderLaneList(view){
  var lanes=capData.topLanes||[];
  var maxWpw=lanes.length?lanes[0].wpw:1;
  document.getElementById('lanesHdr').textContent=view==='lanes'?'All active lanes':'Top active lanes';
  var shown=view==='lanes'?lanes:lanes.slice(0,6);
  document.getElementById('laneList').innerHTML=shown.length
    ?shown.map(function(l){
        return '<div class="lane-row">'+
          '<span class="lane-label">'+l.lane+'</span>'+
          '<div class="lane-bar-wrap"><div class="lane-bar" style="width:'+Math.round(l.wpw/maxWpw*100)+'%"></div></div>'+
          '<span class="lane-wpw">'+l.wpw.toFixed(1)+'/wk</span>'+
        '</div>';
      }).join('')
    :'<div style="color:var(--muted);font-size:12px;">No lane data.</div>';
}
</script>
</body>
</html>
